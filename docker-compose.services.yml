version: "3.8"

services:
  mongo:
    image: mongo:5.0
    container_name: sntl-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - sentanyl

  redis:
    image: redis:7-alpine
    container_name: sntl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    networks:
      - sentanyl

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sntl-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - sentanyl

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: sntl-frontend
    restart: unless-stopped
    networks:
      - sentanyl

  caddy:
    image: caddy:2-alpine
    container_name: sntl-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - core-service
      - marketing-service
      - lms-service
      - video-service
      - coaching-service
      - frontend
    networks:
      - sentanyl

  core-service:
    build:
      context: .
      dockerfile: core-service/Dockerfile
    container_name: sntl-core
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./sentanyl-gcs-key.json:/app/sentanyl-gcs-key.json:ro
    environment:
      - HTTP_PORT=8081
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=sentanyl_db
      - MONGO_ENV=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LMS_SERVICE_URL=http://lms-service:8083
      - MARKETING_SERVICE_URL=http://marketing-service:8082
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - PUBLIC_BASE_URL=http://localhost
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SENTANYL_E2E_MODE=${SENTANYL_E2E_MODE:-0}
      - GCP_PROJECT_ID=${GCS_PROJECT_ID:-sendhero}
      - GCS_BUCKET=${GCS_BUCKET:-sendhero-videos}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/sentanyl-gcs-key.json
      - PDF_SERVICE_URL=http://pdf-service:9774
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentanyl

  marketing-service:
    build:
      context: .
      dockerfile: marketing-service/Dockerfile
    container_name: sntl-marketing
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - HTTP_PORT=8082
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=sentanyl_db
      - MONGO_ENV=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EMAIL_PROVIDER=smtp
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - CORE_SERVICE_URL=http://core-service:8081
      - AI_PROVIDER=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - sentanyl

  lms-service:
    build:
      context: .
      dockerfile: lms-service/Dockerfile
    container_name: sntl-lms
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - HTTP_PORT=8083
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=sentanyl_db
      - MONGO_ENV=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # LLM provider for course generation. Leave LLM_PROVIDER unset to let
      # the service auto-detect from whichever API key is present; set it
      # explicitly to force a choice ("openai", "anthropic", "none").
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentanyl

  video-service:
    build:
      context: .
      dockerfile: video-service/Dockerfile
    container_name: sntl-video
    restart: unless-stopped
    ports:
      - "8084:8084"
    volumes:
      - ./sentanyl-gcs-key.json:/app/sentanyl-gcs-key.json:ro
    environment:
      - HTTP_PORT=8084
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=sentanyl_db
      - MONGO_ENV=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GCP_PROJECT_ID=${GCS_PROJECT_ID:-sendhero}
      - GCS_PROJECT_ID=${GCS_PROJECT_ID:-sendhero}
      - GCS_BUCKET=${GCS_BUCKET:-sendhero-videos}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/sentanyl-gcs-key.json
      # Force HTTP/1.1 for GCS uploads — HTTP/2 streams were being reset by the
      # local network path after ~47s, wrecking uploads.
      - GODEBUG=http2client=0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentanyl

  pdf-service:
    build:
      context: .
      dockerfile: pdf-service/Dockerfile
    container_name: sntl-pdf
    restart: unless-stopped
    expose:
      - "9774"
    networks:
      - sentanyl

  coaching-service:
    build:
      context: .
      dockerfile: coaching-service/Dockerfile
    container_name: sntl-coaching
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - COACHING_SERVICE_PORT=8086
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=sentanyl_db
      - MONGO_ENV=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SENTANYL_ENV=${SENTANYL_ENV:-local}
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://livekit-server:7880}
      - LIVEKIT_HTTP_URL=${LIVEKIT_HTTP_URL:-http://livekit-server:7880}
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecret32ch}
      - GCS_S3_HMAC_KEY=${GCS_S3_HMAC_KEY:-}
      - GCS_S3_HMAC_SECRET=${GCS_S3_HMAC_SECRET:-}
      - VIDEO_SERVICE_URL=http://video-service:8084
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost}
      - CALENDLY_CLIENT_ID=${CALENDLY_CLIENT_ID:-}
      - CALENDLY_CLIENT_SECRET=${CALENDLY_CLIENT_SECRET:-}
      - CALENDLY_REDIRECT_URL=${CALENDLY_REDIRECT_URL:-http://localhost/webhooks/calendly/callback}
      - CALENDLY_WEBHOOK_KEY=${CALENDLY_WEBHOOK_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentanyl

  livekit-server:
    image: livekit/livekit-server:latest
    container_name: sntl-livekit
    profiles: ["dev-livekit"]
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecret32ch}"
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    networks:
      - sentanyl

  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: sntl-crawler
    profiles:
      - crawl
    environment:
      - BASE_URL=http://caddy
      - API_BASE=http://caddy
      - CRAWL_EMAIL=crawler@sentanyl-test.local
      - CRAWL_PASSWORD=CrawlerPass1!
      - CRAWL_BUSINESS=Crawler Test Co
      - CRAWL_LOGIN=1
      - CRAWL_MODE=${CRAWL_MODE:-full}
    volumes:
      - ./crawler:/app
      - /app/node_modules
    depends_on:
      - caddy
    networks:
      - sentanyl

volumes:
  mongo-data:

networks:
  sentanyl:
    driver: bridge
