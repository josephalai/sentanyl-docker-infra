version: "3.8"

# Hot-reload dev stack — mounts source code and runs services with 'go run'.
# Restart a service container to pick up code changes.
#
# USAGE:
#   docker compose -f docker-compose-hot.yml up
#
# NOTE: No build step needed — uses golang:1.25 image with source mounted.

services:
  mongo:
    image: mongo:5.0
    container_name: sntl-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - sentanyl

  redis:
    image: redis:7-alpine
    container_name: sntl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10
    networks:
      - sentanyl

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sntl-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - sentanyl

  caddy:
    image: caddy:2-alpine
    container_name: sntl-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - core-service
      - marketing-service
      - lms-service
      - video-service
      - coaching-service
    networks:
      - sentanyl

  core-service:
    image: golang:1.25
    container_name: sntl-core-hot
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - HTTP_PORT=8081
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=sentanyl_db
      - MONGO_ENV=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LMS_SERVICE_URL=http://lms-service:8083
      - MARKETING_SERVICE_URL=http://marketing-service:8082
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - PUBLIC_BASE_URL=http://localhost
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    command: go run ./core-service/cmd/...
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentanyl

  marketing-service:
    image: golang:1.25
    container_name: sntl-marketing-hot
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - HTTP_PORT=8082
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=sentanyl_db
      - MONGO_ENV=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EMAIL_PROVIDER=smtp
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - CORE_SERVICE_URL=http://core-service:8081
    command: go run ./marketing-service/cmd/...
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - sentanyl

  lms-service:
    image: golang:1.25
    container_name: sntl-lms-hot
    restart: unless-stopped
    ports:
      - "8083:8083"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - HTTP_PORT=8083
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=sentanyl_db
      - MONGO_ENV=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: go run ./lms-service/cmd/...
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentanyl

  video-service:
    image: golang:1.25
    container_name: sntl-video-hot
    restart: unless-stopped
    ports:
      - "8084:8084"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - HTTP_PORT=8084
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=sentanyl_db
      - MONGO_ENV=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GCP_PROJECT_ID=${GCS_PROJECT_ID:-sendhero}
      - GCS_PROJECT_ID=${GCS_PROJECT_ID:-sendhero}
      - GCS_BUCKET=${GCS_BUCKET:-sendhero-videos}
      - GOOGLE_APPLICATION_CREDENTIALS=/workspace/sentanyl-gcs-key.json
    command: go run ./video-service/cmd/...
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentanyl

  coaching-service:
    image: golang:1.25
    container_name: sntl-coaching-hot
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - COACHING_SERVICE_PORT=8086
      - MONGO_HOST=mongo
      - MONGO_PORT=27017
      - MONGO_DB=sentanyl_db
      - MONGO_ENV=docker
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SENTANYL_ENV=${SENTANYL_ENV:-local}
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://livekit-server:7880}
      - LIVEKIT_HTTP_URL=${LIVEKIT_HTTP_URL:-http://livekit-server:7880}
      - LIVEKIT_PUBLIC_URL=${LIVEKIT_PUBLIC_URL:-ws://localhost:7880}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY:-devkey}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecret32ch}
      - GCS_S3_HMAC_KEY=${GCS_S3_HMAC_KEY:-}
      - GCS_S3_HMAC_SECRET=${GCS_S3_HMAC_SECRET:-}
      - VIDEO_SERVICE_URL=http://video-service:8084
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost}
      - CALENDLY_CLIENT_ID=${CALENDLY_CLIENT_ID:-}
      - CALENDLY_CLIENT_SECRET=${CALENDLY_CLIENT_SECRET:-}
      - CALENDLY_REDIRECT_URL=${CALENDLY_REDIRECT_URL:-http://localhost/webhooks/calendly/callback}
      - CALENDLY_WEBHOOK_KEY=${CALENDLY_WEBHOOK_KEY:-}
    command: go run ./coaching-service/cmd/...
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sentanyl

  livekit-server:
    image: livekit/livekit-server:latest
    container_name: sntl-livekit-hot
    profiles: ["dev-livekit"]
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecretdevsecretdevsecret32ch}"
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    networks:
      - sentanyl

volumes:
  mongo-data:

networks:
  sentanyl:
    driver: bridge
